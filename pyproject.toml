[project]
name = "tidydraws"
version = "0.1.0a0"
description = "A tidybayes-inspired data layer for declarative Bayesian visualisation in Python"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
dependencies = [
    "polars >=0.20",
    "arviz >=1.0",
    "xarray",
    "numpy",
]

[project.optional-dependencies]
letsplot = [
    "lets-plot",
]
plotnine = [
    "plotnine",
    "seaborn",
]
all = [
    "tidydraws[letsplot]",
    "tidydraws[plotnine]",
]

dev = [
    "pytest >=8.0",
    "ruff >=0.4",
    "mypy >=1.0",
    "quarto >=0.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
