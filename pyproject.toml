[project]
name = "tidydraws"
version = "0.1.0a0"
description = "A tidybayes-inspired data layer for declarative Bayesian visualisation in Python"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
dependencies = [
    "polars >=0.20",
    "arviz >=1.0",
    "xarray",
    "numpy",
    "pyarrow>=24.0.0",
]

[project.optional-dependencies]
letsplot = [
    "lets-plot",
]
plotnine = [
    "plotnine",
    "seaborn",
]
all = [
    "tidydraws[letsplot]",
    "tidydraws[plotnine]",
]

dev = [
    "pytest >=8.0",
    "ruff >=0.4",
    "mypy >=1.0",
    "pandas-stubs",
    "prek",
    "ipykernel",
    "quarto >=0.1",
    "great-docs>=0.14.0",
    "lets-plot",
    "plotnine",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=9.1.1",
    "lets-plot",
    "plotnine",
]

[tool.ruff]
line-length = 88
extension = { qmd = "markdown" }
include = ["pyproject.toml", "*.py", "*.pyi", "*.ipynb", "*.qmd"]

[tool.ruff.format]
preview = true
docstring-code-format = true

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["F841"]

[tool.pytest.ini_options]
addopts = [
    "-v",
    "--color=yes",
]

[tool.mypy]
files = "tidydraws/*.py"
exclude = "build|dist|docs|tests"
warn_unused_ignores = true
warn_redundant_casts = true
check_untyped_defs = true

[[tool.mypy.overrides]]
module = [
    "arviz.*",
    "xarray.*",
    "numpy.*",
    "pandas.*",
    "polars.*",
]
ignore_missing_imports = true
